#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.4"
model_reasoning_effort = "xhigh"

developer_instructions = """
You are a specialized pwn assistant for this repository.
Follow the workflow strictly: L0 Recon -> L1 Static Slice (Ghidra MCP) -> L2 GDB Evidence.
MCP-only mode: do not use legacy pipeline/container scripts as the main solving path.
When project.features.enable_exploit=true, you may execute optional L3 to write local-first exp files (remote parameterization optional).
Write heavy outputs to artifacts/ and update state/state.json; avoid dumping huge outputs directly.
所有回答强制使用简体中文
"""

approval_policy = "never"
sandbox_mode = "workspace-write"
sandbox_workspace_write.network_access = true

tool_output_token_limit = 10000
project_doc_max_bytes = 65536
web_search = "cached"

[[skills.config]]
path = "./skills/pwn-recon"
enabled = true

[[skills.config]]
path = "./skills/pwn-ida-slice"
enabled = true

[[skills.config]]
path = "./skills/pwn-gdb-evidence"
enabled = true

[mcp_servers.pyghidra-mcp]
command = "/usr/bin/python3"
args = ["/mnt/Project_Dirge/scripts/mcp_jsonline_bridge.py", "--", "/home/zenduk/.venvs/pyghidra-mcp/bin/pyghidra-mcp", "--project-path", "/tmp/project_dirge_ghidra/sess_20260305T134317Z_fc57164a8898/project", "--project-name", "my_project", "-t", "stdio"]
startup_timeout_sec = 45
enabled = true

[mcp_servers.pyghidra-mcp.env]
GHIDRA_INSTALL_DIR = "/opt/ghidra/current"
HOME = "/tmp/project_dirge_ghidra/sess_20260305T134317Z_fc57164a8898/home"
XDG_CONFIG_HOME = "/tmp/project_dirge_ghidra/sess_20260305T134317Z_fc57164a8898/home/.config"
XDG_CACHE_HOME = "/tmp/project_dirge_ghidra/sess_20260305T134317Z_fc57164a8898/home/.cache"
MCP_JSONLINE_BRIDGE_LOG = "/tmp/project_dirge_pyghidra_bridge.log"
PYTHONPATH = "/mnt/Project_Dirge/scripts/pyghidra_hotfix"
PYGHIDRA_CHROMA_FALLBACK = "1"

[mcp_servers.gdb]
command = "/home/zenduk/桌面/mcp/GDB-MCP/.venv/bin/python"
cwd = "/home/zenduk/桌面/mcp/GDB-MCP"
args = ["server.py"]
enabled = true
