#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.4"
model_reasoning_effort = "xhigh"

approval_policy = "never"
sandbox_mode = "workspace-write"
sandbox_workspace_write.network_access = true

tool_output_token_limit = 10000
project_doc_max_bytes = 65536
web_search = "cached"

developer_instructions = """
You are a specialized pwn assistant for this repository.
Follow the workflow strictly: L0 Recon -> L1 Static Slice (Ghidra MCP) -> L2 GDB Evidence.
MCP-only mode: do not use legacy pipeline/container scripts as the main solving path.
When project.features.enable_exploit=true, you may execute optional L3 to write local-first exp files (remote parameterization optional).
Write heavy outputs to artifacts/ and update state/state.json; avoid dumping huge outputs directly.
所有回答强制使用简体中文
"""

[mcp_servers.pyghidra-mcp]
command = "/usr/bin/python3"
args = ["./scripts/mcp_jsonline_bridge.py", "--", "./scripts/pyghidra_mcp_launcher.py", "--project-path", "artifacts/ghidra/default-project", "--project-name", "my_project", "-t", "stdio"]
startup_timeout_sec = 45
enabled = true

[mcp_servers.pyghidra-mcp.env]
GHIDRA_INSTALL_DIR = "./.ghidra-current"
HOME = "artifacts/ghidra/runtime-home/home"
XDG_CONFIG_HOME = "artifacts/ghidra/runtime-home/home/.config"
XDG_CACHE_HOME = "artifacts/ghidra/runtime-home/home/.cache"
XDG_DATA_HOME = "artifacts/ghidra/runtime-home/home/.local/share"
MCP_JSONLINE_BRIDGE_LOG = "artifacts/bridge-rel.log"
PYTHONPATH = "./scripts/pyghidra_hotfix"
PYGHIDRA_CHROMA_FALLBACK = "1"
PYGHIDRA_LAUNCHER_SCRIPT = "./scripts/pyghidra_mcp_launcher.py"

[mcp_servers.gdb]
command = "/usr/bin/python3"
args = ["./scripts/gdb_mcp_launcher.py"]
cwd = "."
enabled = true

[mcp_servers.gdb.env]
GDB_LAUNCHER_SCRIPT = "./scripts/gdb_mcp_launcher.py"
